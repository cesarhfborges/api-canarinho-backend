openapi: 3.0.3
info:
  title: 'API Canarinho'
  description: TESTE
  version: 2.0.0
servers:
  -
    url: 'http://localhost:8000'
paths:
  /api/admin/login:
    post:
      summary: Login
      operationId: login
      description: 'Realiza a autenticação e retorna um Cookie HttpOnly.'
      parameters: []
      responses: {  }
      tags:
        - '1. Autenticação Admin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: ''
                  example: nulla
                  nullable: false
                password:
                  type: string
                  description: ''
                  example: iusto
                  nullable: false
              required:
                - username
                - password
      security: []
  /api/admin/register:
    post:
      summary: 'Auto-Cadastro (Registro)'
      operationId: autoCadastroRegistro
      description: 'Cria um novo usuário comum, caso a configuração ALLOW_REGISTRATION esteja ativa.'
      parameters: []
      responses: {  }
      tags:
        - '1. Autenticação Admin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: znrjbiofpzpmx
                  nullable: false
                username:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: mbviwxsvqelhsp
                  nullable: false
                email:
                  type: string
                  description: 'Must be a valid email address. Must not be greater than 255 characters.'
                  example: swaniawski.donny@example.org
                  nullable: false
                password:
                  type: string
                  description: 'Must be at least 6 characters.'
                  example: \V|RUqK<~V5uUq\
                  nullable: false
              required:
                - name
                - username
                - email
                - password
      security: []
  /api/admin/logout:
    post:
      summary: Logout
      operationId: logout
      description: 'Invalida o token de sessão e remove o cookie.'
      parameters: []
      responses: {  }
      tags:
        - '1. Autenticação Admin'
  /api/admin/me:
    get:
      summary: 'Obter Usuário Logado'
      operationId: obterUsurioLogado
      description: 'Retorna os dados do usuário autenticado no painel.'
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: Unauthorized.
                properties:
                  error:
                    type: string
                    example: Unauthorized.
      tags:
        - '1. Autenticação Admin'
    put:
      summary: 'Atualizar Perfil'
      operationId: atualizarPerfil
      description: 'Atualiza os dados básicos do próprio usuário logado.'
      parameters: []
      responses: {  }
      tags:
        - '1. Autenticação Admin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: obasqlvju
                  nullable: false
                email:
                  type: string
                  description: ''
                  example: null
                  nullable: false
              required:
                - name
  /api/admin/me/password:
    put:
      summary: 'Atualizar Senha do Perfil'
      operationId: atualizarSenhaDoPerfil
      description: 'Atualiza a senha do próprio usuário logado.'
      parameters: []
      responses: {  }
      tags:
        - '1. Autenticação Admin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  description: 'Must be at least 6 characters.'
                  example: '|!u4|5YXQT'
                  nullable: false
              required:
                - password
  /api/admin/projects:
    get:
      summary: 'Listar Projetos'
      operationId: listarProjetos
      description: 'Retorna todos os projetos do usuário logado.'
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: Unauthorized.
                properties:
                  error:
                    type: string
                    example: Unauthorized.
      tags:
        - '2. Gestão de Projetos'
    post:
      summary: 'Criar Projeto'
      operationId: criarProjeto
      description: 'Cria um novo projeto e gera seu slug.'
      parameters: []
      responses: {  }
      tags:
        - '2. Gestão de Projetos'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: hmgnamxynfyemcxw
                  nullable: false
                slug:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: cm
                  nullable: false
              required:
                - name
                - slug
  '/api/admin/projects/{id}':
    get:
      summary: 'Obter Projeto'
      operationId: obterProjeto
      description: 'Retorna os detalhes de um projeto específico.'
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: Unauthorized.
                properties:
                  error:
                    type: string
                    example: Unauthorized.
      tags:
        - '2. Gestão de Projetos'
    put:
      summary: 'Atualizar Projeto'
      operationId: atualizarProjeto
      description: 'Atualiza os dados de um projeto existente.'
      parameters: []
      responses: {  }
      tags:
        - '2. Gestão de Projetos'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: bpdvwmpzxeci
                  nullable: false
                slug:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: vmvlkvdikmmmynldn
                  nullable: false
              required:
                - name
                - slug
    delete:
      summary: 'Deletar Projeto'
      operationId: deletarProjeto
      description: 'Remove um projeto e todos os seus endpoints e mocks vinculados.'
      parameters: []
      responses: {  }
      tags:
        - '2. Gestão de Projetos'
    parameters:
      -
        in: path
        name: id
        description: ''
        example: doloremque
        required: true
        schema:
          type: string
  '/api/admin/projects/{projectId}/endpoints':
    get:
      summary: 'Listar Endpoints'
      operationId: listarEndpoints
      description: 'Retorna todos os endpoints vinculados a um projeto.'
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: Unauthorized.
                properties:
                  error:
                    type: string
                    example: Unauthorized.
      tags:
        - '3. Gestão de Endpoints'
    post:
      summary: 'Criar Endpoint'
      operationId: criarEndpoint
      description: 'Adiciona um novo endpoint ao projeto especificando as configurações de CRUD.'
      parameters: []
      responses: {  }
      tags:
        - '3. Gestão de Endpoints'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: ''
                  example: inventore
                  nullable: false
                generator:
                  type: string
                  description: ''
                  example: non
                  nullable: true
                endpoints:
                  type: object
                  description: ''
                  example: null
                  nullable: true
                  properties: {  }
                resourceSchema:
                  type: object
                  description: ''
                  example: null
                  nullable: true
                  properties: {  }
              required:
                - name
    parameters:
      -
        in: path
        name: projectId
        description: ''
        example: ab
        required: true
        schema:
          type: string
  '/api/admin/projects/{projectId}/endpoints/{id}':
    get:
      summary: 'Obter Endpoint'
      operationId: obterEndpoint
      description: 'Retorna os detalhes de um endpoint específico.'
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: Unauthorized.
                properties:
                  error:
                    type: string
                    example: Unauthorized.
      tags:
        - '3. Gestão de Endpoints'
    parameters:
      -
        in: path
        name: projectId
        description: ''
        example: aperiam
        required: true
        schema:
          type: string
      -
        in: path
        name: id
        description: ''
        example: autem
        required: true
        schema:
          type: string
  '/api/admin/endpoints/{id}':
    put:
      summary: 'Atualizar Endpoint'
      operationId: atualizarEndpoint
      description: 'Altera as configurações e permissões de um endpoint existente.'
      parameters: []
      responses: {  }
      tags:
        - '3. Gestão de Endpoints'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: ''
                  example: aut
                  nullable: false
                generator:
                  type: string
                  description: ''
                  example: similique
                  nullable: true
                endpoints:
                  type: object
                  description: ''
                  example: null
                  nullable: true
                  properties: {  }
                resourceSchema:
                  type: object
                  description: ''
                  example: null
                  nullable: true
                  properties: {  }
              required:
                - name
    delete:
      summary: 'Deletar Endpoint'
      operationId: deletarEndpoint
      description: 'Remove um endpoint e todos os dados associados a ele.'
      parameters: []
      responses: {  }
      tags:
        - '3. Gestão de Endpoints'
    parameters:
      -
        in: path
        name: id
        description: ''
        example: placeat
        required: true
        schema:
          type: string
  '/api/admin/projects/{projectId}/endpoints/{id}/generate':
    post:
      summary: 'Gerar Dados Mock'
      operationId: gerarDadosMock
      description: "Gera e armazena registros falsos baseados no `resourceSchema` do Endpoint.\nOpcionalmente, envie o parâmetro `count` no body (padrão 10)."
      parameters: []
      responses: {  }
      tags:
        - '4. Gerador de Mock'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                count:
                  type: integer
                  description: 'Must be at least 0. Must not be greater than 500.'
                  example: 2
                  nullable: false
              required:
                - count
    parameters:
      -
        in: path
        name: projectId
        description: ''
        example: illo
        required: true
        schema:
          type: string
      -
        in: path
        name: id
        description: ''
        example: et
        required: true
        schema:
          type: string
  '/api/admin/projects/{projectId}/tokens':
    get:
      summary: 'Listar Tokens do Projeto'
      operationId: listarTokensDoProjeto
      description: 'Retorna todos os tokens ativos para consumo da Mock API deste projeto.'
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: Unauthorized.
                properties:
                  error:
                    type: string
                    example: Unauthorized.
      tags:
        - '4. Gestão de Tokens (Projetos)'
    post:
      summary: 'Emitir Novo Token'
      operationId: emitirNovoToken
      description: 'Gera um novo token para acesso à Mock API Dinâmica.'
      parameters: []
      responses: {  }
      tags:
        - '4. Gestão de Tokens (Projetos)'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: ''
                  example: et
                  nullable: false
              required:
                - name
    parameters:
      -
        in: path
        name: projectId
        description: ''
        example: aliquid
        required: true
        schema:
          type: string
  '/api/admin/tokens/{id}':
    delete:
      summary: 'Revogar Token'
      operationId: revogarToken
      description: 'Remove um token, impedindo novos acessos com ele.'
      parameters: []
      responses: {  }
      tags:
        - '4. Gestão de Tokens (Projetos)'
    parameters:
      -
        in: path
        name: id
        description: ''
        example: eaque
        required: true
        schema:
          type: string
  /api/admin/users:
    get:
      summary: 'Listar Usuários'
      operationId: listarUsurios
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: Unauthorized.
                properties:
                  error:
                    type: string
                    example: Unauthorized.
      tags:
        - '4. Gestão de Usuários'
    post:
      summary: 'Criar Usuário'
      operationId: criarUsurio
      description: ''
      parameters: []
      responses: {  }
      tags:
        - '4. Gestão de Usuários'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: nnfwxcgofhxyeq
                  nullable: false
                username:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: ejdvxygvun
                  nullable: false
                email:
                  type: string
                  description: 'Must be a valid email address. Must not be greater than 255 characters.'
                  example: rath.hertha@example.org
                  nullable: false
                password:
                  type: string
                  description: 'Must be at least 6 characters.'
                  example: 'o0EGW(G6y3]VTU+'
                  nullable: false
                is_admin:
                  type: boolean
                  description: ''
                  example: false
                  nullable: false
                is_active:
                  type: boolean
                  description: ''
                  example: false
                  nullable: false
              required:
                - name
                - username
                - email
                - password
  '/api/admin/users/{id}':
    get:
      summary: 'Obter Usuário'
      operationId: obterUsurio
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: Unauthorized.
                properties:
                  error:
                    type: string
                    example: Unauthorized.
      tags:
        - '4. Gestão de Usuários'
    put:
      summary: 'Atualizar Usuário'
      operationId: atualizarUsurio
      description: ''
      parameters: []
      responses: {  }
      tags:
        - '4. Gestão de Usuários'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: xwwxbrvyyoqxttahjczv
                  nullable: false
                username:
                  type: string
                  description: ''
                  example: null
                  nullable: false
                email:
                  type: string
                  description: ''
                  example: null
                  nullable: false
                is_admin:
                  type: boolean
                  description: ''
                  example: true
                  nullable: false
                is_active:
                  type: boolean
                  description: ''
                  example: false
                  nullable: false
              required:
                - name
    delete:
      summary: 'Deletar Usuário'
      operationId: deletarUsurio
      description: ''
      parameters: []
      responses: {  }
      tags:
        - '4. Gestão de Usuários'
    parameters:
      -
        in: path
        name: id
        description: ''
        example: vitae
        required: true
        schema:
          type: string
  '/api/admin/users/{id}/password':
    put:
      summary: 'Atualizar Senha de um Usuário'
      operationId: atualizarSenhaDeUmUsurio
      description: ''
      parameters: []
      responses: {  }
      tags:
        - '4. Gestão de Usuários'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  description: 'Must be at least 6 characters.'
                  example: Ws\^KI
                  nullable: false
              required:
                - password
    parameters:
      -
        in: path
        name: id
        description: ''
        example: aliquid
        required: true
        schema:
          type: string
  '/api/admin/endpoints/{endpointId}/rules':
    get:
      summary: 'Listar Regras'
      operationId: listarRegras
      description: 'Retorna as regras cadastradas para o endpoint informado.'
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: Unauthorized.
                properties:
                  error:
                    type: string
                    example: Unauthorized.
      tags:
        - '5. Regras Dinâmicas (Mocks)'
    post:
      summary: 'Criar Regra'
      operationId: criarRegra
      description: 'Adiciona uma nova condição (Header, Query ou Body) que altera a resposta do endpoint.'
      parameters: []
      responses: {  }
      tags:
        - '5. Regras Dinâmicas (Mocks)'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                condition_type:
                  type: string
                  description: ''
                  example: header
                  nullable: false
                  enum:
                    - header
                    - query
                    - body
                condition_key:
                  type: string
                  description: ''
                  example: voluptas
                  nullable: false
                condition_operator:
                  type: string
                  description: ''
                  example: not_equals
                  nullable: false
                  enum:
                    - equals
                    - not_equals
                    - contains
                condition_value:
                  type: string
                  description: ''
                  example: asperiores
                  nullable: false
                response_status:
                  type: integer
                  description: ''
                  example: 8
                  nullable: false
                response_body:
                  type: object
                  description: ''
                  example: null
                  nullable: true
                  properties: {  }
              required:
                - condition_type
                - condition_key
                - condition_operator
                - condition_value
                - response_status
    parameters:
      -
        in: path
        name: endpointId
        description: ''
        example: dolorem
        required: true
        schema:
          type: string
  '/api/admin/rules/{id}':
    put:
      summary: 'Atualizar Regra'
      operationId: atualizarRegra
      description: 'Altera as propriedades de uma regra dinâmica existente.'
      parameters: []
      responses: {  }
      tags:
        - '5. Regras Dinâmicas (Mocks)'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                condition_type:
                  type: string
                  description: ''
                  example: query
                  nullable: false
                  enum:
                    - header
                    - query
                    - body
                condition_key:
                  type: string
                  description: ''
                  example: officiis
                  nullable: false
                condition_operator:
                  type: string
                  description: ''
                  example: contains
                  nullable: false
                  enum:
                    - equals
                    - not_equals
                    - contains
                condition_value:
                  type: string
                  description: ''
                  example: qui
                  nullable: false
                response_status:
                  type: integer
                  description: ''
                  example: 4
                  nullable: false
                response_body:
                  type: object
                  description: ''
                  example: null
                  nullable: true
                  properties: {  }
              required:
                - condition_type
                - condition_key
                - condition_operator
                - condition_value
                - response_status
    delete:
      summary: 'Deletar Regra'
      operationId: deletarRegra
      description: 'Remove permanentemente a regra de avaliação.'
      parameters: []
      responses: {  }
      tags:
        - '5. Regras Dinâmicas (Mocks)'
    parameters:
      -
        in: path
        name: id
        description: ''
        example: sint
        required: true
        schema:
          type: string
  '/api/{username}/{projectSlug}/{path:.*}':
    get:
      summary: ''
      operationId: getApiUsernameProjectSlugPath
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: 'Project token not provided.'
                properties:
                  error:
                    type: string
                    example: 'Project token not provided.'
      tags:
        - '6. API Mocks Dinâmicos'
      security: []
    post:
      summary: ''
      operationId: postApiUsernameProjectSlugPath
      description: ''
      parameters: []
      responses: {  }
      tags:
        - '6. API Mocks Dinâmicos'
      security: []
    put:
      summary: ''
      operationId: putApiUsernameProjectSlugPath
      description: ''
      parameters: []
      responses: {  }
      tags:
        - '6. API Mocks Dinâmicos'
      security: []
    patch:
      summary: ''
      operationId: patchApiUsernameProjectSlugPath
      description: ''
      parameters: []
      responses: {  }
      tags:
        - '6. API Mocks Dinâmicos'
      security: []
    delete:
      summary: ''
      operationId: deleteApiUsernameProjectSlugPath
      description: ''
      parameters: []
      responses: {  }
      tags:
        - '6. API Mocks Dinâmicos'
      security: []
    parameters:
      -
        in: path
        name: username
        description: ''
        example: eos
        required: true
        schema:
          type: string
      -
        in: path
        name: projectSlug
        description: ''
        example: rerum
        required: true
        schema:
          type: string
      -
        in: path
        name: path
        description: ''
        example: in
        required: true
        schema:
          type: string
  /api/admin/dashboard/metrics:
    get:
      summary: 'Obter Métricas do Dashboard'
      operationId: obterMtricasDoDashboard
      description: 'Retorna os totais, gráficos e endpoints mais acessados do usuário logado.'
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: Unauthorized.
                properties:
                  error:
                    type: string
                    example: Unauthorized.
      tags:
        - '7. Dashboard Analytics'
  /api/admin/dashboard/chart:
    get:
      summary: 'Obter Dados do Gráfico (Histórico)'
      operationId: obterDadosDoGrficoHistrico
      description: 'Retorna o histórico de acessos (hits) agrupados por hora, dia ou mês.'
      parameters:
        -
          in: query
          name: start
          description: 'Data inicial (formato YYYY-MM-DD HH:MM:SS). Opcional (Padrão: 7 dias atrás).'
          example: perferendis
          required: false
          schema:
            type: string
            description: 'Data inicial (formato YYYY-MM-DD HH:MM:SS). Opcional (Padrão: 7 dias atrás).'
            example: perferendis
            nullable: false
        -
          in: query
          name: end
          description: 'Data final (formato YYYY-MM-DD HH:MM:SS). Opcional (Padrão: agora).'
          example: nostrum
          required: false
          schema:
            type: string
            description: 'Data final (formato YYYY-MM-DD HH:MM:SS). Opcional (Padrão: agora).'
            example: nostrum
            nullable: false
        -
          in: query
          name: groupby
          description: 'Agrupamento dos dados (hour, day, month). Opcional (Padrão: day).'
          example: in
          required: false
          schema:
            type: string
            description: 'Agrupamento dos dados (hour, day, month). Opcional (Padrão: day).'
            example: in
            nullable: false
        -
          in: query
          name: endpoint_id
          description: 'ID do endpoint para filtrar. Opcional.'
          example: 8
          required: false
          schema:
            type: integer
            description: 'ID do endpoint para filtrar. Opcional.'
            example: 8
            nullable: false
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
